hf:
  title: MedAlloc RL
  emoji: 🏥
  colorFrom: blue
  colorTo: red
  sdk: docker
  
name: hospital_env
version: 2.0.0
description: Hospital Resource Allocation Reinforcement Learning Environment

tasks:
  - id: easy
    name: Basic Allocation
    description: 5 patients, 10 beds. Agent learns priority-based allocation.
    difficulty: easy
    max_steps: 5

  - id: medium
    name: Balanced Pressure
    description: 8 patients, 8 beds. Exact parity between patients and beds.
    difficulty: medium
    max_steps: 5

  - id: hard
    name: Crisis Mode
    description: 10 patients, 5 beds. Severe scarcity requires tough triage decisions.
    difficulty: hard
    max_steps: 5

server:
  port: 7860
  host: 0.0.0.0
